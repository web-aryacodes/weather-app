<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
        <!--left side-->
    <div class="sidebar left">

      <div class="weather-box small" data-city="Mumbai">
        <h3>Mumbai</h3>
        <img class="side-icon" src="">
        <p class="side-temp">--°C</p>
      </div>

      <div class="weather-box small" data-city="Delhi">
        <h3>Delhi</h3>
        <img class="side-icon" src="">
        <p class="side-temp">--°C</p>
      </div>

      <div class="weather-box small" data-city="Pune">
        <h3>Pune</h3>
        <img class="side-icon" src="">
        <p class="side-temp">--°C</p>
      </div>

    </div>

    <div class="main">

      <h1 class="app-title">Weather App</h1>

      <div class="search-box">
        <input type="text" id="cityInput" placeholder="Search city">
        <button id="searchBtn">Search</button>
      </div>

      <div class="weather-box big">
        <h2 id="cityName">Mumbai</h2>
        <img id="weatherIcon" src="">
        <h1 id="temperature">--°C</h1>
        <p id="description">--</p>
      </div>

      <div class="extra-space"></div>

    </div>
        <!--right side-->
    <div class="sidebar right">

      <div class="weather-box small" data-city="London">
        <h3>London</h3>
        <img class="side-icon" src="">
        <p class="side-temp">--°C</p>
      </div>

      <div class="weather-box small" data-city="Tokyo">
        <h3>Tokyo</h3>
        <img class="side-icon" src="">
        <p class="side-temp">--°C</p>
      </div>

      <div class="weather-box small" data-city="New York">
        <h3>New York</h3>
        <img class="side-icon" src="">
        <p class="side-temp">--°C</p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
